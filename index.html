<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Suporte — Achadinhos Digitais</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0e0618;
  --bg2:        #160d24;
  --card:       rgba(255,255,255,0.05);
  --border:     rgba(255,255,255,0.08);
  --border-lit: rgba(200,80,255,0.35);
  --purple:     #a020f0;
  --pink:       #e040fb;
  --pink2:      #ff4ecd;
  --neon:       #d946ef;
  --green:      #22c55e;
  --yellow:     #f59e0b;
  --red:        #ef4444;
  --text1:      #f5eeff;
  --text2:      #b08ecc;
  --text3:      #6b4d85;
  --radius:     18px;
  --radius-sm:  12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text1);
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%, rgba(160,32,240,0.2) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 90% 100%, rgba(224,64,251,0.15) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(160,32,240,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(160,32,240,0.035) 1px, transparent 1px);
  background-size: 42px 42px;
  pointer-events: none; z-index: 0;
}

#app { position: relative; height: 100%; display: flex; flex-direction: column; z-index: 1; overflow: hidden; }

.view {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s ease, transform 0.3s ease;
  transform: translateX(28px);
}
.view.active { opacity: 1; pointer-events: all; transform: translateX(0); }
.view.out { opacity: 0; transform: translateX(-28px); }

/* LOADING */
#view-loading { align-items: center; justify-content: center; gap: 20px; text-align: center; }

.splash-logo {
  width: 90px; height: 90px;
  border-radius: 26px;
  background: linear-gradient(135deg, #7c1dba, #c026d3);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  box-shadow: 0 0 50px rgba(192,38,211,0.55), 0 0 100px rgba(192,38,211,0.2);
  animation: float 3s ease-in-out infinite;
  position: relative;
}
.splash-logo::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 29px;
  background: conic-gradient(from 0deg, #a020f0, #e040fb, #ff4ecd, #a020f0);
  z-index: -1;
  animation: spin 3s linear infinite;
  opacity: 0.7;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes spin { to { transform: rotate(360deg); } }

.splash-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 34px;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #e040fb, #ff4ecd, #c026d3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.splash-sub {
  font-size: 12px;
  color: var(--text2);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  margin-top: -8px;
}
.spinner {
  width: 30px; height: 30px;
  border: 2.5px solid rgba(160,32,240,0.2);
  border-top-color: #e040fb;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

/* HEADER */
.header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(14,6,24,0.88);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
  position: relative;
}
.header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, #c026d3, transparent);
  opacity: 0.5;
}
.btn-back {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(160,32,240,0.12); border: 1px solid var(--border-lit);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; color: var(--text1); flex-shrink: 0;
}
.btn-back:active { transform: scale(0.88); background: rgba(160,32,240,0.28); }
.h-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, #7c1dba, #c026d3);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  box-shadow: 0 0 16px rgba(192,38,211,0.45);
}
.h-info { flex: 1; min-width: 0; }
.h-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 19px; letter-spacing: 1px;
  color: var(--text1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.h-sub {
  font-size: 12px; color: var(--text2);
  display: flex; align-items: center; gap: 5px;
  margin-top: 1px; font-weight: 700;
}
.dot-online {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* LIST TOP */
.list-top {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 10px; flex-shrink: 0;
}
.brand-sm {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, #7c1dba, #c026d3);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; box-shadow: 0 0 12px rgba(192,38,211,0.4);
}
.brand-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 1.5px;
  background: linear-gradient(90deg, #e040fb, #ff4ecd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* TABS */
.tabs { display: flex; gap: 6px; padding: 0 14px 10px; flex-shrink: 0; overflow-x: auto; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 7px 15px; border-radius: 30px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text2); font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.tab.active { border-color: var(--border-lit); background: rgba(160,32,240,0.15); color: #e040fb; }

/* SCROLL */
.scroll-area { flex: 1; overflow-y: auto; padding: 8px 14px 80px; -webkit-overflow-scrolling: touch; }
.scroll-area::-webkit-scrollbar { width: 0; }

/* TICKET CARD */
.tcard {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
  cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.tcard::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px;
}
.tcard.s-open::before { background: var(--red); box-shadow: 0 0 8px var(--red); }
.tcard.s-in_progress::before { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
.tcard.s-resolved::before, .tcard.s-closed::before { background: var(--green); box-shadow: 0 0 8px var(--green); }
.tcard:active { transform: scale(0.98); }
.tc-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.tc-cat { font-size: 14px; font-weight: 800; color: var(--text1); display: flex; align-items: center; gap: 6px; }
.badge { font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 20px; }
.b-open { background: rgba(239,68,68,0.14); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
.b-in_progress { background: rgba(245,158,11,0.14); color: #fde68a; border: 1px solid rgba(245,158,11,0.2); }
.b-resolved,.b-closed { background: rgba(34,197,94,0.1); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
.tc-meta { display: flex; gap: 10px; font-size: 12px; color: var(--text2); font-weight: 700; margin-bottom: 6px; }
.tc-prev { font-size: 13px; color: var(--text3); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* FAB */
.fab {
  position: fixed; bottom: 22px; right: 18px;
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(135deg, #7c1dba, #c026d3);
  border: none; color: white; font-size: 26px; cursor: pointer;
  box-shadow: 0 0 28px rgba(192,38,211,0.55), 0 4px 16px rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; transition: transform 0.2s;
}
.fab:active { transform: scale(0.88); }

/* EMPTY */
.empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px; text-align: center; }
.empty-ico { font-size: 52px; opacity: 0.28; }
.empty-t { font-size: 17px; font-weight: 800; color: var(--text2); }
.empty-s { font-size: 13px; color: var(--text3); font-weight: 600; }

/* NEW TICKET */
.form-scroll { flex: 1; overflow-y: auto; padding: 14px 16px 40px; }
.form-scroll::-webkit-scrollbar { width: 0; }
.flabel { font-size: 11px; font-weight: 800; color: var(--text2); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; margin-top: 18px; }
.flabel:first-child { margin-top: 0; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-btn {
  padding: 14px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text2); font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.cat-btn .cem { font-size: 22px; }
.cat-btn.sel { border-color: var(--border-lit); background: rgba(160,32,240,0.15); color: #e040fb; box-shadow: 0 0 16px rgba(160,32,240,0.2); }
.ibox { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; transition: border-color 0.2s; margin-top: 10px; }
.ibox:focus-within { border-color: var(--border-lit); }
.ibox textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--text1); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 500; resize: none; min-height: 90px; line-height: 1.5; }
.ibox textarea::placeholder { color: var(--text3); }
.btn-pri {
  width: 100%; padding: 14px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #7c1dba, #c026d3);
  border: none; color: white; font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 900; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s; margin-top: 14px;
  box-shadow: 0 0 22px rgba(192,38,211,0.38); letter-spacing: 0.5px;
}
.btn-pri:disabled { opacity: 0.38; box-shadow: none; }
.btn-pri:active:not(:disabled) { transform: scale(0.98); }

/* CHAT */
.tinfo-bar {
  display: grid; grid-template-columns: 1fr 1fr; gap: 5px 14px;
  padding: 10px 14px; background: rgba(160,32,240,0.09);
  border-bottom: 1px solid rgba(160,32,240,0.16);
  font-size: 12px; color: var(--text2); font-weight: 700; flex-shrink: 0;
}
.ir { display: flex; align-items: center; gap: 5px; }
.ir span { color: var(--text1); font-weight: 800; }
.ir.full { grid-column: 1/-1; }

.msgs { flex: 1; overflow-y: auto; padding: 12px 14px 8px; display: flex; flex-direction: column; gap: 4px; -webkit-overflow-scrolling: touch; }
.msgs::-webkit-scrollbar { width: 0; }

.mgroup { display: flex; flex-direction: column; }
.mgroup.mine { align-items: flex-end; }
.mgroup.theirs { align-items: flex-start; }
.mwho { font-size: 11px; font-weight: 800; margin-bottom: 3px; padding: 0 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.mgroup.mine .mwho { color: rgba(224,64,251,0.6); }
.mgroup.theirs .mwho { color: rgba(34,197,94,0.7); }
.bbl {
  max-width: 80%; padding: 9px 13px; border-radius: 18px;
  font-size: 14px; line-height: 1.45; word-break: break-word;
  animation: pop 0.2s ease both;
}
@keyframes pop { from{opacity:0;transform:translateY(10px) scale(0.93)} to{opacity:1;transform:none} }
.mgroup.mine .bbl { background: linear-gradient(135deg, #7c1dba, #c026d3); color: white; border-bottom-right-radius: 5px; box-shadow: 0 4px 18px rgba(192,38,211,0.38); }
.mgroup.theirs .bbl { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.09); color: var(--text1); border-bottom-left-radius: 5px; }
.btime { font-size: 10px; opacity: 0.55; margin-top: 4px; font-weight: 700; }
.mgroup.mine .btime { text-align: right; }
.datesep { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 11px; color: var(--text3); font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; }
.datesep::before,.datesep::after { content:''; flex:1; height:1px; background:var(--border); }

/* INPUT */
.ibar {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px 12px; padding-bottom: max(10px,env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  background: rgba(14,6,24,0.93); backdrop-filter: blur(20px); flex-shrink: 0;
  position: relative;
}
.ibar::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background: linear-gradient(90deg,transparent,rgba(160,32,240,0.55),transparent); }
.iwrap {
  flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  border-radius: 22px; padding: 9px 14px; display: flex; align-items: flex-end;
  gap: 6px; transition: border-color 0.2s; min-height: 42px;
}
.iwrap:focus-within { border-color: var(--border-lit); }
.ifield {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text1); font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 500; resize: none; max-height: 100px; overflow-y: auto; line-height: 1.4;
}
.ifield::placeholder { color: var(--text3); }
.ifield::-webkit-scrollbar { width: 0; }
.bico { width: 32px; height: 32px; border-radius: 50%; background: transparent; border: none; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 17px; transition: color 0.15s; }
.bico:active { color: #e040fb; }
.bsend {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, #7c1dba, #c026d3);
  border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 0 20px rgba(192,38,211,0.5); transition: transform 0.15s, opacity 0.15s; flex-shrink: 0;
}
.bsend:active { transform: scale(0.88); }
.bsend:disabled { opacity: 0.35; box-shadow: none; }

/* ACTIONS */
.atd-row { display: flex; gap: 8px; padding: 8px 14px 4px; flex-shrink: 0; }
.bact {
  flex: 1; padding: 11px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text1); font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s; text-align: center;
}
.bact.take { border-color: rgba(160,32,240,0.4); background: rgba(160,32,240,0.12); color: #e040fb; }
.bact.res { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.1); color: #86efac; }
.bact:active { transform: scale(0.97); }

/* PHOTO BAR */
.pbar { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-top: 1px solid var(--border); background: rgba(14,6,24,0.9); flex-shrink: 0; }
.pthumb { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border-lit); }
.pinfo { flex: 1; font-size: 12px; color: var(--text2); font-weight: 700; }
.prm { width: 28px; height: 28px; border-radius: 50%; background: rgba(239,68,68,0.15); border: none; color: #fca5a5; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

/* TOAST */
.toast {
  position: fixed; top: 66px; left: 50%;
  transform: translateX(-50%) translateY(-16px);
  background: rgba(22,13,36,0.97); border: 1px solid var(--border-lit);
  color: var(--text1); padding: 8px 18px; border-radius: 24px;
  font-size: 13px; font-weight: 800; backdrop-filter: blur(20px);
  z-index: 999; opacity: 0; transition: all 0.25s ease;
  pointer-events: none; white-space: nowrap;
  box-shadow: 0 0 22px rgba(160,32,240,0.25);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#finput { display: none; }
</style>
</head>
<body>
<div id="app">

  <!-- LOADING -->
  <div id="view-loading" class="view active">
    <div class="splash-logo">🎧</div>
    <div class="splash-name">Suporte</div>
    <div class="splash-sub">Achadinhos Digitais</div>
    <div class="spinner"></div>
  </div>

  <!-- LIST -->
  <div id="view-list" class="view">
    <div class="list-top">
      <div class="brand-sm">🎧</div>
      <div class="brand-label" id="list-label">Meus Tickets</div>
    </div>
    <div class="tabs">
      <button class="tab active" data-s="open" onclick="changeTab(this)">🔴 Abertos</button>
      <button class="tab" data-s="in_progress" onclick="changeTab(this)">🟡 Atendendo</button>
      <button class="tab" data-s="resolved" onclick="changeTab(this)">🟢 Resolvidos</button>
    </div>
    <div class="scroll-area" id="list-area">
      <div class="empty"><div class="spinner"></div></div>
    </div>
    <button class="fab" id="fab" onclick="goNew()">＋</button>
  </div>

  <!-- NEW TICKET -->
  <div id="view-new" class="view">
    <div class="header">
      <button class="btn-back" onclick="goList()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="h-info">
        <div class="h-title">Novo Chamado</div>
        <div class="h-sub">Achadinhos Digitais</div>
      </div>
    </div>
    <div class="form-scroll">
      <div class="flabel">Categoria do problema</div>
      <div class="cat-grid">
        <button class="cat-btn" data-c="produto" onclick="selCat(this)"><span class="cem">📦</span>Produto</button>
        <button class="cat-btn" data-c="pagamento" onclick="selCat(this)"><span class="cem">💳</span>Pagamento</button>
        <button class="cat-btn" data-c="tecnico" onclick="selCat(this)"><span class="cem">⚙️</span>Técnico</button>
        <button class="cat-btn" data-c="outro" onclick="selCat(this)"><span class="cem">❓</span>Outro</button>
      </div>
      <div class="flabel">Descreva o problema</div>
      <div class="ibox">
        <textarea id="new-desc" placeholder="Explique com detalhes o que aconteceu..." rows="4"></textarea>
      </div>
      <button class="btn-pri" id="btn-create" onclick="createTicket()" disabled>✨ Abrir Chamado</button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="view-chat" class="view">
    <div class="header">
      <button class="btn-back" onclick="leaveChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="h-avatar" id="catav">🎧</div>
      <div class="h-info">
        <div class="h-title" id="chat-title">Suporte</div>
        <div class="h-sub" id="chat-sub"><span class="dot-online"></span><span>Online agora</span></div>
      </div>
    </div>
    <div class="tinfo-bar" id="tinfo"></div>
    <div class="msgs" id="msgs"></div>
    <div class="atd-row" id="atd-row" style="display:none"></div>
    <div class="pbar" id="pbar" style="display:none">
      <img id="pthumb" class="pthumb" src="" alt="">
      <div class="pinfo">Foto selecionada</div>
      <button class="prm" onclick="rmPhoto()">✕</button>
    </div>
    <div class="ibar" id="ibar">
      <div class="iwrap">
        <textarea class="ifield" id="msginput" placeholder="Digite sua mensagem..." rows="1"
          oninput="autoR(this);updSend()" onkeydown="onKey(event)"></textarea>
        <button class="bico" onclick="pickPhoto()">📷</button>
      </div>
      <button class="bsend" id="bsend" onclick="sendMsg()" disabled>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <input type="file" id="finput" accept="image/*" onchange="onPhoto(event)">
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === CONFIG ===
const API = 'https://2cfe05235a4747b7ae8923f8042d7d4e.squarecloud.app/api'; // ← TROQUE PELA SUA URL

// === TELEGRAM SAFE INIT ===
let tg = null;
let TGU = null;

(function() {
  try {
    if (window.Telegram && window.Telegram.WebApp) {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      TGU = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : null;
    }
  } catch(e) { console.warn('TG WebApp init error:', e); }
  // Fallback DEV
  if (!TGU) TGU = { id: 99999999, first_name: 'Usuário', last_name: '' };
})();

// === STATE ===
let role = 'client';
let ticketId = null;
let ticket = null;
let poll = null;
let cat = null;
let photo = null;
let tab = 'open';
let lastN = 0;

// === INIT ===
async function init() {
  try {
    const r = await GET(`/init?userId=${TGU.id}&initData=${encodeURIComponent(tg?.initData||'')}`);
    role = r.role || 'client';
    if (role === 'attendant') {
      document.getElementById('list-label').textContent = 'Painel';
      document.getElementById('fab').style.display = 'none';
    }
    showV('list');
    loadList();
  } catch(e) {
    showV('list');
    document.getElementById('list-area').innerHTML = `<div class="empty"><div class="empty-ico">🔧</div><div class="empty-t">Configure a API</div><div class="empty-s">Defina API_BASE com a URL do seu bot</div></div>`;
  }
}

// === API ===
async function GET(path) { const r=await fetch(API+path); if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); }
async function POST(path,body) { const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); }

// === NAV ===
function showV(name) {
  document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.classList.add('out'); setTimeout(()=>v.classList.remove('out'),320); });
  const el = document.getElementById('view-'+name);
  el.classList.remove('out');
  setTimeout(()=>el.classList.add('active'),10);
}
function goList() { showV('list'); loadList(); }
function goNew() { showV('new'); }

// === TABS ===
function changeTab(btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); tab=btn.dataset.s; loadList();
}

// === LIST ===
async function loadList() {
  const a=document.getElementById('list-area');
  a.innerHTML='<div class="empty"><div class="spinner"></div></div>';
  try {
    const d=await GET(`/tickets?userId=${TGU.id}&role=${role}&status=${tab}`);
    const ts=d.tickets||[];
    if(!ts.length){
      a.innerHTML=`<div class="empty"><div class="empty-ico">📭</div><div class="empty-t">Nenhum ticket aqui</div><div class="empty-s">${role==='client'?'Toque em + para abrir um chamado':'Tudo ok por aqui!'}</div></div>`;
      return;
    }
    a.innerHTML=ts.map(renderCard).join('');
  } catch(e) {
    a.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-t">Erro</div><div class="empty-s">${e.message}</div></div>`;
  }
}

function renderCard(t) {
  const cats={produto:'📦 Produto',pagamento:'💳 Pagamento',tecnico:'⚙️ Técnico',outro:'❓ Outro'};
  const sl={open:'Aguardando',in_progress:'Em atendimento',resolved:'Resolvido',closed:'Fechado'};
  const bc={open:'b-open',in_progress:'b-in_progress',resolved:'b-resolved',closed:'b-closed'};
  const dt=new Date(t.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  const prev=t.last_message?(t.last_message.length>45?t.last_message.slice(0,45)+'…':t.last_message):'';
  return `<div class="tcard s-${t.status}" onclick="openTicket('${t.id}')">
    <div class="tc-row1"><div class="tc-cat">${cats[t.category]||'❓ Outro'}</div><div class="badge ${bc[t.status]||'b-open'}">${sl[t.status]||t.status}</div></div>
    <div class="tc-meta"><span>🕐 ${dt}</span><span>💬 ${t.messages_count||0}</span>${role==='attendant'?`<span>🆔 ${t.user_id}</span>`:''}</div>
    ${prev?`<div class="tc-prev">"${esc(prev)}"</div>`:''}
  </div>`;
}

// === CHAT ===
async function openTicket(id) {
  ticketId=id; lastN=0;
  showV('chat');
  document.getElementById('msgs').innerHTML='<div class="empty"><div class="spinner"></div></div>';
  document.getElementById('tinfo').innerHTML='';
  document.getElementById('atd-row').style.display='none';
  await loadChat();
  startPoll();
}

async function loadChat() {
  try {
    const d=await GET(`/ticket/${ticketId}?userId=${TGU.id}&role=${role}`);
    ticket=d.ticket; renderChat(ticket);
  } catch(e){ toast('❌ Erro ao carregar'); }
}

function renderChat(t) {
  const cem={produto:'📦',pagamento:'💳',tecnico:'⚙️',outro:'❓'};
  const cfull={produto:'📦 Produto',pagamento:'💳 Pagamento',tecnico:'⚙️ Técnico',outro:'❓ Outro'};
  const stxt={open:'🔴 Aguardando',in_progress:'🟡 Em atendimento',resolved:'🟢 Resolvido',closed:'⚫ Fechado'};

  document.getElementById('catav').textContent=cem[t.category]||'🎧';
  document.getElementById('chat-title').textContent=cfull[t.category]||'Suporte';

  const op=new Date(t.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('tinfo').innerHTML=`
    <div class="ir">🎫 <span>${t.id.replace('TICKET_','').replace(/_/g,' ')}</span></div>
    <div class="ir">📋 <span>${stxt[t.status]||t.status}</span></div>
    <div class="ir">📅 <span>${op}</span></div>
    ${role==='attendant'?`<div class="ir">🆔 <span>${t.user_id}</span></div>`:''}
    ${t.description?`<div class="ir full">💬 <span style="font-style:italic">"${esc(t.description.slice(0,60))}${t.description.length>60?'…':''}"</span></div>`:''}
  `;

  const area=document.getElementById('msgs');
  const ms=t.messages||[];
  const changed=ms.length!==lastN; lastN=ms.length;

  if(!ms.length){
    area.innerHTML=`<div class="empty"><div class="empty-ico">💬</div><div class="empty-t">Inicie a conversa</div><div class="empty-s">Digite abaixo</div></div>`;
  } else {
    let html='',pFrom=null,pDate=null,open=false;
    ms.forEach((m,i)=>{
      const isMe=String(m.from)===String(TGU.id);
      const md=new Date(m.timestamp).toLocaleDateString('pt-BR');
      const mt=new Date(m.timestamp).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      if(md!==pDate){
        if(open){html+='</div>';open=false;}
        html+=`<div class="datesep">${md===new Date().toLocaleDateString('pt-BR')?'Hoje':md}</div>`;
        pFrom=null; pDate=md;
      }
      if(m.from!==pFrom){
        if(open) html+='</div>';
        const side=isMe?'mine':'theirs';
        const who=isMe
          ?(role==='attendant'?'🧑‍💼 Você':'🧑 Você')
          :(role==='client'?'🧑‍💼 Atendente':`🧑 ID:${t.user_id}`);
        html+=`<div class="mgroup ${side}"><div class="mwho">${who}</div>`;
        open=true; pFrom=m.from;
      }
      const cnt=m.photo_id?'📷 <em>Imagem</em>':esc(m.text);
      html+=`<div class="bbl">${cnt}<div class="btime">${mt}</div></div>`;
    });
    if(open) html+='</div>';
    area.innerHTML=html;
  }

  const atd=document.getElementById('atd-row');
  const ib=document.getElementById('ibar');
  if(role==='attendant'){
    if(t.status==='open'){
      atd.style.display='flex';
      atd.innerHTML=`<button class="bact take" onclick="takeTicket()">🎯 Pegar este Ticket</button>`;
      ib.style.display='none';
    } else if(t.status==='in_progress'&&String(t.assigned_to)===String(TGU.id)){
      atd.style.display='flex';
      atd.innerHTML=`<button class="bact res" onclick="resolveTicket()">✅ Marcar Resolvido</button>`;
      ib.style.display='flex';
    } else { atd.style.display='none'; ib.style.display='none'; }
  } else {
    const ok=t.status==='open'||t.status==='in_progress';
    ib.style.display=ok?'flex':'none';
    if(!ok&&t.status==='resolved'&&!t.rating){
      atd.style.display='flex';
      atd.innerHTML=`<button class="bact" onclick="toast('⭐ Avalie pelo bot!')">⭐ Avaliar Atendimento</button>`;
    } else { atd.style.display='none'; }
  }

  if(changed) setTimeout(()=>area.scrollTo({top:area.scrollHeight,behavior:'smooth'}),60);
}

function startPoll(){
  stopPoll();
  poll=setInterval(async()=>{
    if(!ticketId) return;
    try{ const d=await GET(`/ticket/${ticketId}?userId=${TGU.id}&role=${role}`); if((d.ticket.messages?.length||0)!==lastN){ticket=d.ticket;renderChat(ticket);} }catch(e){}
  },2500);
}
function stopPoll(){ if(poll){clearInterval(poll);poll=null;} }
function leaveChat(){ stopPoll(); ticketId=null; showV('list'); loadList(); }

// === SEND ===
async function sendMsg(){
  const inp=document.getElementById('msginput');
  const txt=inp.value.trim();
  if(!txt&&!photo) return;
  document.getElementById('bsend').disabled=true;
  try{
    await POST(`/ticket/${ticketId}/message`,{userId:TGU.id,userName:TGU.first_name||'Usuário',text:txt||null,photo:photo?photo.b64:null,role,initData:tg?.initData||''});
    inp.value=''; inp.style.height='auto';
    rmPhoto(); updSend();
    toast('✅ Enviado!',1400);
    await loadChat();
  }catch(e){ toast('❌ Erro ao enviar'); }
  document.getElementById('bsend').disabled=false;
}
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function updSend(){ document.getElementById('bsend').disabled=!document.getElementById('msginput').value.trim()&&!photo; }
function autoR(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

// === PHOTO ===
function pickPhoto(){ document.getElementById('finput').click(); }
function onPhoto(e){
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=ev=>{ const d=ev.target.result; photo={b64:d.split(',')[1]}; document.getElementById('pthumb').src=d; document.getElementById('pbar').style.display='flex'; document.getElementById('bsend').disabled=false; };
  rd.readAsDataURL(f); e.target.value='';
}
function rmPhoto(){ photo=null; document.getElementById('pbar').style.display='none'; updSend(); }

// === ATTENDANT ===
async function takeTicket(){
  try{ await POST(`/ticket/${ticketId}/take`,{userId:TGU.id,userName:TGU.first_name||'Atendente',initData:tg?.initData||''}); toast('✅ Ticket pegado!'); await loadChat(); }catch(e){ toast('❌ '+e.message); }
}
async function resolveTicket(){
  if(!confirm('Marcar como resolvido?')) return;
  try{ await POST(`/ticket/${ticketId}/resolve`,{userId:TGU.id,initData:tg?.initData||''}); toast('✅ Resolvido!'); await loadChat(); }catch(e){ toast('❌ '+e.message); }
}

// === NEW TICKET ===
function selCat(btn){ document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); cat=btn.dataset.c; chkCreate(); }
function chkCreate(){ document.getElementById('btn-create').disabled=!cat||!document.getElementById('new-desc').value.trim(); }
document.getElementById('new-desc').addEventListener('input',chkCreate);
async function createTicket(){
  const desc=document.getElementById('new-desc').value.trim();
  if(!cat||!desc) return;
  const btn=document.getElementById('btn-create');
  btn.disabled=true; btn.textContent='Criando…';
  try{
    const d=await POST('/ticket',{userId:TGU.id,userName:TGU.first_name||'Usuário',category:cat,description:desc,initData:tg?.initData||''});
    toast('✅ Chamado aberto!');
    document.getElementById('new-desc').value='';
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));
    cat=null; chkCreate();
    setTimeout(()=>openTicket(d.ticketId),800);
  }catch(e){ toast('❌ Erro ao criar'); btn.disabled=false; btn.textContent='✨ Abrir Chamado'; }
}

// === UTILS ===
let toastTimer=null;
function toast(msg,dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),dur);
}
function esc(s){ if(!s)return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

window.addEventListener('load',init);
</script>
</body>
</html>
